<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests">
<title>Sir Fisher · Análise individual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="assets/dashboard-common.css" rel="stylesheet">
<link href="assets/product-pages.css" rel="stylesheet">
<link href="assets/accessibility.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/safe-dom.js"></script>
<script src="assets/accessibility.js"></script>
</head>
<body>
<div class="app">
  <header>
    <div class="head-row"><div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12z"/><circle cx="9" cy="12" r="1" fill="#fff"/></svg></div><div><h1>Sir Fisher</h1><span>Painel de Gestão</span></div></div><div class="head-meta"><div class="unidade">Análise individual</div></div></div>
    <nav class="tabs"><a href="./">Visão Geral</a><a href="vendas.html">Faturamento</a><a href="caixa.html">Caixa</a><a href="dre.html">DRE</a><a href="despesas.html">Despesas</a><a href="conciliacao.html">Conciliação</a><a href="planejamento.html">Planejamento</a><a href="rotinas.html" class="routines">Rotinas</a></nav>
  </header>
  <main id="main">
    <div class="page-intro"><div><h2>Análise individual</h2><p>Transações de fornecedores marcados como "analisar individual". Cada uma é classificada à parte. <b id="contador">—</b></p></div></div>
    <div class="panel"><div id="content"><div class="loading">Carregando…</div></div></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const sb=SirFisherSupabase;
const esc = SirFisherDOM.escapeHTML;
const content  = document.getElementById('content');
const contador = document.getElementById('contador');
const toastEl  = document.getElementById('toast');

function toast(msg, isErr){
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=> toastEl.className = 'toast', 2200);
}

function fmtMoeda(v){
  return new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(Math.abs(v||0));
}

function fmtData(min, max){
  if (!min) return '';
  const dia = d => { const p = d.split('-'); return `${p[2]}/${p[1]}`; };
  const completa = d => { const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
  if (!max || min === max) return completa(min);
  return `${dia(min)} a ${completa(max)}`;
}

function tituloCase(s){
  return (s||'').toLowerCase().split(' ').map(w => w ? w[0].toUpperCase()+w.slice(1) : w).join(' ');
}

async function carregar(){
  content.innerHTML = '<div class="loading">Carregando…</div>';
  const [{data: itens, error: e1}, {data: categorias, error: e2}] = await Promise.all([
    sb.from('app_analise_individual').select('*').order('valor', {ascending:true}),
    sb.from('app_categoria_dre').select('categoria, dre_grupo, natureza').order('categoria')
  ]);

  if (e1 || e2) {
    content.innerHTML = `<div class="erro">Não consegui carregar. ${esc((e1||e2).message)}</div>`;
    return;
  }

  contador.textContent = itens.length === 0
    ? 'Nenhuma pendência.'
    : `${itens.length} para analisar`;

  if (itens.length === 0){
    content.innerHTML = '<div class="empty">✓ Nenhuma transação para análise individual no momento.</div>';
    return;
  }

  const list = document.createElement('div');
  list.className = 'op-list';
  itens.forEach(tx => list.appendChild(linha(tx, categorias)));
  content.innerHTML = '';
  content.appendChild(list);
}

function linha(tx, categorias){
  const el = document.createElement('div');
  el.className = 'op-row';

  // Filtra as categorias pela natureza da transacao:
  // Despesa -> Despesa + Contabil + Ambos ; Receita -> Receita + Contabil + Ambos
  const permitidas = tx.natureza === 'Receita'
    ? ['Receita', 'Contabil', 'Ambos']
    : ['Despesa', 'Contabil', 'Ambos'];
  const cats = categorias.filter(c => permitidas.includes(c.natureza));
  const opcoes = cats.map(c =>
    `<option value="${esc(c.categoria)}">${esc(c.categoria)} · ${esc(c.dre_grupo)}</option>`
  ).join('');

  const ehReceita = (tx.valor || 0) >= 0;
  const sinal = ehReceita ? '+' : '−';
  const classeValor = ehReceita ? 'valor receita' : 'valor despesa';
  const selo = ehReceita
    ? '<span class="status ok">Receita</span>'
    : '<span class="status bad">Despesa</span>';

  const temCnpj = (tx.contraparte_doc || '').includes('/');

  el.innerHTML = `
    <div class="info">
      <div class="nome">${esc(tx.contraparte_nome || '(sem nome)')}</div>
      <div class="meta">
        <span>${esc(temCnpj ? 'CNPJ ' + tx.contraparte_doc : 'pessoa física')}</span>
        <span>${esc(fmtData(tx.data_caixa))}</span>
        ${selo}
      </div>
    </div>
    <div class="${classeValor}">${sinal} ${fmtMoeda(tx.valor)}</div>
    <div class="controls">
      <select class="field">
        <option value="" disabled selected>Escolher categoria…</option>
        ${opcoes}
      </select>
      <button class="button save" disabled>Salvar</button>
    </div>
  `;

  const select = el.querySelector('select');
  const btn = el.querySelector('button.save');

  select.addEventListener('change', () => {
    btn.disabled = !select.value;
  });

  btn.addEventListener('click', async () => {
    const categoria = select.value;
    if (!categoria) return;
    el.classList.add('saving');
    btn.disabled = true;

    // Ajuste por TRANSACAO (nao cria regra de fornecedor).
    // upsert: se eu reclassificar a mesma transacao, atualiza.
    const { error } = await sb.from('ajuste_manual').upsert({
      origem: tx.origem,
      raw_id: tx.raw_id,
      categoria: categoria
    }, { onConflict: 'origem,raw_id' });

    if (error) {
      el.classList.remove('saving');
      btn.disabled = false;
      toast('Não salvou: ' + error.message, true);
      return;
    }

    toast('Classificado: ' + categoria);
    el.classList.add('done');
    setTimeout(() => {
      el.remove();
      const restantes = content.querySelectorAll('.op-row').length;
      contador.textContent = restantes === 0 ? 'Nenhuma pendência.' : `${restantes} para analisar`;
      if (restantes === 0) carregar();
    }, 350);
  });

  return el;
}

SirFisherAuth.requireRole(sb,['admin','gestor','operador']).then(ctx=>{if(ctx)carregar();});
</script>
</body>
</html>
