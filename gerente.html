<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests">
<title>Sir Fisher · Painel do Gerente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="assets/dashboard-common.css" rel="stylesheet">
<link href="assets/product-pages.css" rel="stylesheet">
<link href="assets/accessibility.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/safe-dom.js"></script>
<script src="assets/dashboard-utils.js"></script>
<script src="assets/accessibility.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD" crossorigin="anonymous"></script>
<style>
  .chart-wrap{position:relative;}
  .h-day{height:230px;}.h-gasto{height:230px;}.h-hora{height:200px;}.h-cascata{height:340px;}.h-metahist{height:230px;}
  .summary-card .hint{margin-top:4px;}
  .meta-top{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .meta-pct{font-size:34px;font-weight:700;line-height:1;}
  .meta-diff{font-size:12px;font-weight:500;}
  .bullet{margin-top:22px;}
  .bullet-track{position:relative;height:24px;background:#EFECE3;border-radius:6px;overflow:visible;margin-bottom:22px;}
  .bullet-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;min-width:2px;}
  .bullet-fill .bf-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#fff;font-size:12px;font-weight:700;white-space:nowrap;}
  .bullet-mark{position:absolute;top:-4px;bottom:-4px;width:3px;border-radius:2px;}
  .bullet-mark.proj{background:var(--teal);}
  .bullet-mark.meta{background:var(--amber);}
  .bm-top{position:absolute;bottom:calc(100% + 4px);left:50%;font-size:10.5px;font-weight:700;white-space:nowrap;line-height:1.25;text-align:center;}
  .bm-bot{position:absolute;top:calc(100% + 4px);left:50%;font-size:10.5px;font-weight:700;white-space:nowrap;line-height:1.25;text-align:center;}
  .legenda{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px;}
  .legenda span{display:flex;align-items:center;gap:6px;}
  .legenda i{width:14px;height:10px;border-radius:2px;display:inline-block;}
  @media (max-width:430px){.summary-card .value{font-size:21px;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="head-row"><div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12z"/><circle cx="9" cy="12" r="1" fill="#fff"/></svg></div><div><h1>Sir Fisher</h1><span>Painel de Gestão</span></div></div><div class="head-meta"><div class="unidade">Painel do Gerente</div></div></div>
    <nav class="tabs"><a href="./">Visão Geral</a><a href="vendas.html">Faturamento</a><a href="caixa.html">Caixa</a><a href="dre.html">DRE</a><a href="despesas.html">Despesas</a><a href="conciliacao.html">Conciliação</a><a href="planejamento.html">Planejamento</a><a href="rotinas.html" class="routines">Rotinas</a></nav>
  </header>
  <main id="main"><div class="loading">Carregando painel…</div></main>
  <footer id="rodape" style="display:none"><span id="rodapeAtt"></span></footer>
</div>
<script>
const sb=SirFisherSupabase;
const esc=SirFisherDOM.escapeHTML;
const {brl,brl0,pct,rs}=SirFisherFormat;
const C={header:'#12313F',teal:'#00A6A6',amber:'#D6A84F',green:'#2E7D5B',red:'#C94C4C',muted:'#6B7280',border:'#E5E7EB'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let CHARTS=[];

function hojeISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nomeMes(anoMes){return MESES[+anoMes.slice(5,7)-1]+' de '+anoMes.slice(0,4);}
function ddmm(iso){return iso.slice(8,10)+'/'+iso.slice(5,7);}
function abrevK0(v){if(v==null||v===0)return '';if(Math.abs(v)>=1000)return Math.round(v/1000)+'K';return String(Math.round(v));}
function al(pos){return pos>82?'translateX(-100%)':(pos<18?'translateX(0)':'translateX(-50%)');}

async function carregar(){
  const main=document.getElementById('main');
  try{
    const r=await sb.from('app_gerente_resumo_mensal').select('*').order('ano_mes',{ascending:true});
    if(r.error)throw r.error;
    const rows=(r.data||[]).filter(x=>x.ano_mes);
    if(!rows.length)throw new Error('Ainda não há dados carregados.');
    const mesAtual=hojeISO().slice(0,7);
    const cur=rows.find(x=>x.ano_mes===mesAtual)||rows[rows.length-1];
    const mes=cur.ano_mes;

    const[dia,gasto,hora,uc,saldoVar,cascata]=await Promise.all([
      sb.from('app_gerente_meta_diaria').select('dia,venda_dia,meta_dia').eq('mes',mes+'-01').order('dia',{ascending:true}),
      sb.from('app_gerente_gasto_grupo').select('grupo,participacao_perc').eq('ano_mes',mes),
      sb.from('app_gerente_movimento_hora').select('hora,qtd').eq('ano_mes',mes).order('hora',{ascending:true}),
      sb.from('app_gerente_ultima_carga').select('ultima'),
      sb.from('app_gerente_saldo_variacao').select('ano_mes,variacao_perc').eq('ano_mes',mes).maybeSingle(),
      sb.from('app_gerente_dre_cascata_perc').select('*').eq('ano_mes',mes).maybeSingle()
    ]);
    render(cur,rows,dia.data||[],gasto.data||[],hora.data||[],saldoVar.data||null,cascata.data||null);

    const ultima=(uc.data&&uc.data[0])?uc.data[0].ultima:null;
    if(ultima){
      const d=new Date(ultima);
      document.getElementById('rodapeAtt').textContent='Atualizado em '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      document.getElementById('rodape').style.display='flex';
    }
  }catch(e){main.innerHTML='<div class="erro">Não foi possível carregar o painel: '+esc(e.message||String(e))+'</div>';}
}

function render(cur,rowsHist,dias,gastos,horas,saldoVar,cascata){
  const N=v=>v==null?null:Number(v);
  const hoje=hojeISO();
  let rowDia=dias.find(x=>x.dia===hoje&&x.venda_dia!=null);
  let labelDia='Venda de hoje';
  if(!rowDia){
    const comVenda=dias.filter(x=>x.venda_dia!=null);
    rowDia=comVenda.length?comVenda[comVenda.length-1]:null;
    if(rowDia)labelDia='Última venda ('+ddmm(rowDia.dia)+')';
  }
  const vendaDia=rowDia?N(rowDia.venda_dia):null;
  const metaDia=rowDia?N(rowDia.meta_dia):null;
  const percDia=(vendaDia!=null&&metaDia>0)?vendaDia/metaDia*100:null;

  const meta=N(cur.meta),proj=N(cur.faturamento_proj),percMeta=N(cur.perc_meta),realizado=N(cur.faturamento);
  const diff=(proj!=null&&meta!=null)?proj-meta:null;
  const acima=diff!=null&&diff>=0;
  const corMeta=percMeta==null?C.muted:(percMeta>=100?C.green:(acima?C.teal:C.amber));

  const varCaixa=saldoVar?N(saldoVar.variacao_perc):null;
  const corCaixa=varCaixa==null?C.muted:(varCaixa>=0?C.green:C.red);

  document.getElementById('main').innerHTML=`
    <div class="page-intro"><div><h2>Painel do Gerente</h2><p>Resumo operacional de ${esc(nomeMes(cur.ano_mes))}: acompanhamento de meta, ritmo de vendas e movimento para organizar salão e cozinha.</p></div></div>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">${esc(labelDia)}</div><div class="value">${brl0(vendaDia)}</div><div class="hint">${metaDia!=null?'Meta do dia: '+brl0(metaDia)+(percDia!=null?' · '+pct(percDia):''):'Sem meta definida para o dia'}</div></div>
      <div class="summary-card"><div class="label">Ticket médio</div><div class="value">${rs(cur.ticket_medio)}</div><div class="hint">${(cur.qtd_vendas||0).toLocaleString('pt-BR')} vendas no mês</div></div>
      <div class="summary-card"><div class="label">Variação do caixa</div><div class="value" style="color:${corCaixa}">${varCaixa==null?'—':(varCaixa>=0?'▲ ':'▼ ')+pct(Math.abs(varCaixa))}</div><div class="hint">Fechamento projetado vs mês anterior</div></div>
    </div>

    <section class="panel"><div class="panel-head"><div><h3>Meta do mês</h3><div class="hint">Tendência de fechamento sobre a meta de ${brl(meta)}</div></div></div>
      <div id="bullet"></div>
      <div class="hint" style="margin-top:6px">Vendas por dia contra a meta diária:</div>
      <div class="chart-wrap h-day"><canvas id="chartDia"></canvas></div>
    </section>

    <section class="panel"><div class="panel-head"><div><h3>Cascata do resultado</h3><div class="hint">Cada linha em percentual da receita do mês, da receita ao resultado líquido.</div></div></div>
      <div class="chart-wrap h-cascata"><canvas id="chartCascata"></canvas></div>
      <div class="legenda">
        <span><i style="background:${C.header}"></i>Subtotal</span>
        <span><i style="background:${C.green}"></i>Entra</span>
        <span><i style="background:${C.red}"></i>Consome</span>
      </div>
    </section>

    <section class="panel"><div class="panel-head"><div><h3>Onde está o gasto</h3><div class="hint">Participação de cada grupo no total de gastos do mês, em percentual. Valores e detalhes por fornecedor ficam com a administração.</div></div></div>
      <div class="chart-wrap h-gasto"><canvas id="chartGasto"></canvas></div>
    </section>

    <section class="panel"><div class="panel-head"><div><h3>Movimento por hora</h3><div class="hint">Quantidade de vendas por horário no mês — apoio para escala do salão e da cozinha.</div></div></div>
      <div class="chart-wrap h-hora"><canvas id="chartHora"></canvas></div>
    </section>

    <section class="panel"><div class="panel-head"><div><h3>Atingimento de meta mês a mês</h3><div class="hint">Percentual da meta de faturamento atingido em cada mês.</div></div></div>
      <div class="chart-wrap h-metahist"><canvas id="chartMetaHist"></canvas></div>
    </section>`;

  drawBullet(realizado,proj,meta,percMeta,corMeta);
  drawDia(dias);
  drawCascata(cascata);
  drawGasto(gastos);
  drawHora(horas);
  drawMetaHistorico(rowsHist);
}

function drawBullet(realizado,proj,meta,perc,corPerc){
  realizado=realizado||0;proj=proj||0;meta=meta||0;
  const teto=Math.max(proj,meta)||1;
  const fillW=Math.min(realizado/teto*100,100);
  const projPos=Math.min(proj/teto*100,100);
  const metaPos=Math.min(meta/teto*100,100);
  const acima=proj>=meta;
  const diff=proj-meta;
  const diffTxt=acima?('▲ '+brl(Math.abs(diff))+' acima da meta'):('▼ '+brl(Math.abs(diff))+' abaixo da meta');
  document.getElementById('bullet').innerHTML=`
    <div class="meta-top">
      <span class="meta-pct" style="color:${corPerc}">${pct(perc)}</span>
      <span class="meta-diff" style="color:${acima?C.green:C.red}">${diffTxt}</span>
    </div>
    <div class="bullet">
      <div class="bullet-track">
        <div class="bullet-fill" style="width:${fillW}%;background:${C.green}"><span class="bf-val">${abrevK0(realizado)}</span></div>
        <div class="bullet-mark proj" style="left:${projPos}%"><span class="bm-bot" style="color:${C.teal};transform:${al(projPos)}">Projeção<br>${abrevK0(proj)}</span></div>
        <div class="bullet-mark meta" style="left:${metaPos}%"><span class="bm-top" style="color:${C.amber};transform:${al(metaPos)}">Meta<br>${abrevK0(meta)}</span></div>
      </div>
    </div>`;
}

Chart.defaults.font.family="'Roboto',Arial,sans-serif";Chart.defaults.color=C.muted;

function drawDia(d){
  if(!d.length){document.getElementById('chartDia').parentElement.innerHTML='<div class="hint">Sem vendas registradas no mês.</div>';return;}
  const labels=d.map(r=>r.dia.split('-')[2]);
  const venda=d.map(r=>r.venda_dia==null?null:Number(r.venda_dia));
  const meta=d.map(r=>r.meta_dia==null?null:Number(r.meta_dia));
  CHARTS.push(new Chart(document.getElementById('chartDia'),{
    data:{labels,datasets:[
      {type:'bar',label:'Vendido',data:venda,backgroundColor:C.header,borderRadius:3,order:2},
      {type:'line',label:'Meta',data:meta,borderColor:C.amber,backgroundColor:C.amber,borderWidth:2,borderDash:[4,3],pointRadius:0,tension:.2,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,labels:{boxWidth:10,font:{size:11},usePointStyle:true}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+brl(c.parsed.y)}}},
      scales:{y:{grid:{color:C.border},ticks:{callback:v=>brl(v),font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:9},maxRotation:0,autoSkip:false}}}}}));
}

function drawCascata(row){
  if(!row){document.getElementById('chartCascata').parentElement.innerHTML='<div class="hint">Sem dados de resultado no mês.</div>';return;}
  const N=k=>row[k]==null?0:Number(row[k]);
  const mc=N('margem_contribuicao_perc'), ro=N('resultado_operacional_perc'), rl=N('resultado_liquido_perc');
  const steps=[];
  steps.push({label:'Receita',base:0,end:100,total:true});
  let run=100;
  [['CMV','cmv_perc'],['Impostos s/ venda','impostos_perc']].forEach(([lab,k])=>{const v=N(k);if(Math.abs(v)>0.05){steps.push({label:lab,base:run,end:run+v});run+=v;}});
  steps.push({label:'Margem contribuição',base:0,end:mc,total:true});
  run=mc;
  [['Pessoal','pessoal_perc'],['Infraestrutura','infraestrutura_perc'],['Marketing','marketing_perc']].forEach(([lab,k])=>{const v=N(k);if(Math.abs(v)>0.05){steps.push({label:lab,base:run,end:run+v});run+=v;}});
  steps.push({label:'Resultado operac.',base:0,end:ro,total:true,fin:true});
  run=ro;
  [['Não operacional','nao_operacional_perc'],['Contábil','contabil_perc'],['Investim. (CAPEX)','capex_perc'],['Não categorizado','nao_categorizado_perc']].forEach(([lab,k])=>{const v=N(k);if(Math.abs(v)>0.05){steps.push({label:lab,base:run,end:run+v});run+=v;}});
  steps.push({label:'Resultado líquido',base:0,end:rl,total:true,fin:true});

  const cor=s=>{ if(s.total){ return s.fin?(s.end>=0?C.green:C.red):C.header; } return s.end>=s.base?C.green:C.red; };

  CHARTS.push(new Chart(document.getElementById('chartCascata'),{type:'bar',
    data:{labels:steps.map(s=>s.label),datasets:[{data:steps.map(s=>[s.base,s.end]),backgroundColor:steps.map(cor),borderRadius:3,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const s=steps[c.dataIndex];const v=s.total?s.end:(s.end-s.base);return ' '+(s.total?'':(v>=0?'+':'−'))+pct(Math.abs(v));}}}},
      scales:{x:{grid:{color:C.border},ticks:{callback:v=>v+'%',font:{size:10}}},y:{grid:{display:false},ticks:{font:{size:11},color:C.text,autoSkip:false}}}}}));
}

const pctEnd={id:'pctEnd',afterDatasetsDraw(ch){const{ctx}=ch;const ds=ch.getDatasetMeta(0);ctx.save();ctx.font='600 11px Roboto,Arial';ctx.fillStyle=C.muted;ctx.textBaseline='middle';ds.data.forEach((b,i)=>{ctx.fillText(pct(ch.data.datasets[0].data[i]),b.x+6,b.y);});ctx.restore();}};

function drawGasto(g){
  const c=g.map(r=>({g:r.grupo,v:r.participacao_perc==null?0:Number(r.participacao_perc)})).sort((a,b)=>b.v-a.v);
  if(!c.length){document.getElementById('chartGasto').parentElement.innerHTML='<div class="hint">Sem gastos registrados no mês.</div>';return;}
  CHARTS.push(new Chart(document.getElementById('chartGasto'),{type:'bar',
    data:{labels:c.map(x=>x.g),datasets:[{data:c.map(x=>x.v),backgroundColor:C.teal,borderRadius:4,maxBarThickness:24}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:56}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+pct(c.parsed.x)+' do total de gastos'}}},
      scales:{x:{display:false,grid:{display:false}},y:{grid:{display:false},ticks:{font:{size:11}}}}},
    plugins:[pctEnd]}));
}

function drawHora(h){
  const d=h.filter(r=>r.qtd!=null&&Number(r.qtd)>0);
  if(!d.length){document.getElementById('chartHora').parentElement.innerHTML='<div class="hint">Sem movimento registrado no mês.</div>';return;}
  CHARTS.push(new Chart(document.getElementById('chartHora'),{type:'bar',
    data:{labels:d.map(r=>r.hora+'h'),datasets:[{data:d.map(r=>Number(r.qtd)),backgroundColor:C.header,borderRadius:3,maxBarThickness:22}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y.toLocaleString('pt-BR')+' vendas'}}},
      scales:{y:{grid:{color:C.border},ticks:{font:{size:10},precision:0}},x:{grid:{display:false},ticks:{font:{size:10}}}}}}));
}

function drawMetaHistorico(rowsHist){
  const d=rowsHist.filter(x=>x.perc_meta!=null).slice(-12);
  if(!d.length){document.getElementById('chartMetaHist').parentElement.innerHTML='<div class="hint">Sem histórico suficiente.</div>';return;}
  const labels=d.map(x=>MESES[+x.ano_mes.slice(5,7)-1].slice(0,3)+'/'+x.ano_mes.slice(2,4));
  const valores=d.map(x=>Number(x.perc_meta));
  CHARTS.push(new Chart(document.getElementById('chartMetaHist'),{type:'bar',
    data:{labels,datasets:[{data:valores,backgroundColor:valores.map(v=>v>=100?C.green:(v>=90?C.amber:C.red)),borderRadius:4,maxBarThickness:28}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+pct(c.parsed.y)+' da meta'}}},
      scales:{y:{grid:{color:C.border},ticks:{callback:v=>v+'%',font:{size:10}}},x:{grid:{display:false},ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12}}}}}));
}

(async()=>{
  const auth=await SirFisherAuth.requireRole(sb);
  if(!auth)return;
  carregar();
})();
</script>
</body>
</html>
