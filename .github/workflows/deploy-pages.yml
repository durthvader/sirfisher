name: Deploy to GitHub Pages

# Deploy proprio via GitHub Actions, substituindo o pipeline classico
# "Deploy from a branch" (que ficava travando em Queued / "try again later"
# neste repo depois do rename). O controle de concorrencia abaixo garante
# que um novo push cancela o deploy anterior em vez de empilhar.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare public site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/assets
          cp \
            index.html \
            vendas.html \
            caixa.html \
            dre.html \
            despesas.html \
            gerente.html \
            analise_individual.html \
            classificar_excecoes.html \
            conciliacao.html \
            contas_recorrentes.html \
            parametros.html \
            parametros_gerais.html \
            permissoes.html \
            planejamento.html \
            rotinas.html \
            status.html \
            usuarios.html \
            venda_especie.html \
            _site/
          cp assets/accessibility.css _site/assets/
          cp assets/accessibility.js _site/assets/
          cp assets/auth.js _site/assets/
          cp assets/classification-actions.js _site/assets/
          cp assets/dashboard-common.css _site/assets/
          cp assets/dashboard-utils.js _site/assets/
          cp assets/product-pages.css _site/assets/
          cp assets/safe-dom.js _site/assets/
          cp assets/supabase-client.js _site/assets/

          expected_files="$(printf '%s\n' \
            analise_individual.html \
            assets/accessibility.css \
            assets/accessibility.js \
            assets/auth.js \
            assets/classification-actions.js \
            assets/dashboard-common.css \
            assets/dashboard-utils.js \
            assets/product-pages.css \
            assets/safe-dom.js \
            assets/supabase-client.js \
            caixa.html \
            classificar_excecoes.html \
            conciliacao.html \
            contas_recorrentes.html \
            despesas.html \
            dre.html \
            gerente.html \
            index.html \
            parametros.html \
            parametros_gerais.html \
            permissoes.html \
            planejamento.html \
            rotinas.html \
            status.html \
            usuarios.html \
            venda_especie.html \
            vendas.html)"
          actual_files="$(find _site -type f -printf '%P\n' | sort)"

          if [[ "$actual_files" != "$expected_files" ]]; then
            echo "Unexpected GitHub Pages artifact contents."
            printf 'Expected:\n%s\nActual:\n%s\n' "$expected_files" "$actual_files"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      # O passo de publicacao do Pages falha de forma intermitente com
      # "Deployment failed, try again later" (instabilidade do lado do
      # GitHub, relatada por varios usuarios desde 2026-07-03 em
      # github.com/orgs/community/discussions/200823; ~36% dos runs
      # deste repo falharam entre 02 e 05/07). Re-executar o mesmo
      # deploy costuma passar, entao tentamos ate 3 vezes antes de
      # marcar o run como falho.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (2nd attempt)
        id: deployment_retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (final attempt)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
