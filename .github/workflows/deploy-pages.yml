name: Deploy to GitHub Pages

# Deploy proprio via GitHub Actions, substituindo o pipeline classico
# "Deploy from a branch" (que ficava travando em Queued / "try again later"
# neste repo depois do rename). O controle de concorrencia abaixo garante
# que um novo push cancela o deploy anterior em vez de empilhar.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
