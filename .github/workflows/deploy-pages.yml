name: Deploy to GitHub Pages

# Deploy proprio via GitHub Actions, substituindo o pipeline classico
# "Deploy from a branch" (que ficava travando em Queued / "try again later"
# neste repo depois do rename). O controle de concorrencia abaixo garante
# que um novo push cancela o deploy anterior em vez de empilhar.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare public site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/assets
          cp \
            index.html \
            vendas.html \
            caixa.html \
            dre.html \
            despesas.html \
            gerente.html \
            analise_individual.html \
            classificar_excecoes.html \
            conciliacao.html \
            permissoes.html \
            planejamento.html \
            rotinas.html \
            status.html \
            usuarios.html \
            venda_especie.html \
            _site/
          cp assets/accessibility.css _site/assets/
          cp assets/accessibility.js _site/assets/
          cp assets/auth.js _site/assets/
          cp assets/dashboard-common.css _site/assets/
          cp assets/dashboard-utils.js _site/assets/
          cp assets/product-pages.css _site/assets/
          cp assets/safe-dom.js _site/assets/
          cp assets/supabase-client.js _site/assets/

          expected_files="$(printf '%s\n' \
            analise_individual.html \
            assets/accessibility.css \
            assets/accessibility.js \
            assets/auth.js \
            assets/dashboard-common.css \
            assets/dashboard-utils.js \
            assets/product-pages.css \
            assets/safe-dom.js \
            assets/supabase-client.js \
            caixa.html \
            classificar_excecoes.html \
            conciliacao.html \
            despesas.html \
            dre.html \
            gerente.html \
            index.html \
            permissoes.html \
            planejamento.html \
            rotinas.html \
            status.html \
            usuarios.html \
            venda_especie.html \
            vendas.html)"
          actual_files="$(find _site -type f -printf '%P\n' | sort)"

          if [[ "$actual_files" != "$expected_files" ]]; then
            echo "Unexpected GitHub Pages artifact contents."
            printf 'Expected:\n%s\nActual:\n%s\n' "$expected_files" "$actual_files"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
