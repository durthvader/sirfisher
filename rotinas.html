<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; upgrade-insecure-requests">
<title>Sir Fisher · Rotinas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="assets/dashboard-common.css" rel="stylesheet">
<link href="assets/product-pages.css" rel="stylesheet">
<link href="assets/accessibility.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/safe-dom.js"></script>
<script src="assets/accessibility.js"></script>
</head>
<body>
<div class="app">
  <header>
    <div class="head-row"><div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12z"/><circle cx="9" cy="12" r="1" fill="#fff"/></svg></div><div><h1>Sir Fisher</h1><span>Painel de Gestão</span></div></div><div class="head-meta"><div class="unidade">Rotinas</div></div></div>
    <nav class="tabs"><a href="./">Visão Geral</a><a href="vendas.html">Faturamento</a><a href="caixa.html">Caixa</a><a href="dre.html">DRE</a><a href="despesas.html">Despesas</a><a href="conciliacao.html">Conciliação</a><a href="planejamento.html">Planejamento</a><a href="rotinas.html" class="routines active">Rotinas</a></nav>
  </header>
  <main id="main"><div class="loading">Carregando rotinas…</div></main>
</div>
<script>
const sb=SirFisherSupabase;

const ROTINAS=[
  {
    pagina:'classificar_excecoes.html',
    icone:'<path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24H4a1 1 0 0 0-1 1v5.59a2 2 0 0 0 .59 1.41l9.58 9.59a2 2 0 0 0 2.83 0l4.59-4.59a2 2 0 0 0 0-2.83Z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/>',
    titulo:'Classificar exceções',
    texto:'Fornecedores novos no extrato que ainda não têm categoria definida.'
  },
  {
    pagina:'analise_individual.html',
    icone:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
    titulo:'Análise individual',
    texto:'Transações marcadas para análise separada, classificadas uma a uma.'
  },
  {
    pagina:'venda_especie.html',
    icone:'<path d="M2 7h20v10H2z"/><circle cx="12" cy="12" r="2.5"/>',
    titulo:'Venda em espécie',
    texto:'Lançamento diário do valor de vendas recebidas em dinheiro.'
  }
];

(async()=>{
  const auth=await SirFisherAuth.requireRole(sb);
  if(!auth)return;
  const permitidas=[];
  for(const r of ROTINAS){
    if(await SirFisherAuth.pageAllowsRole(sb,r.pagina,auth.role))permitidas.push(r);
  }
  const main=document.getElementById('main');
  main.innerHTML=`
    <div class="page-intro"><div><h2>Rotinas</h2><p>Ferramentas do dia a dia da operação. Escolha uma rotina abaixo. Novas rotinas aparecem aqui conforme forem adicionadas.</p></div></div>
    <div class="routine-grid">${permitidas.map(r=>`<a class="routine-card" data-pagina="${r.pagina}">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${r.icone}</svg></div>
        <h3>${r.titulo}</h3>
        <p>${r.texto}</p>
      </a>`).join('')||'<div class="empty">Nenhuma rotina disponível para o seu perfil.</div>'}</div>`;
  main.querySelectorAll('.routine-card[data-pagina]').forEach(a=>{a.href=a.dataset.pagina;});
})();
</script>
</body>
</html>
